<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kramer Job-Sortier-Hut</title>
<style>
  :root{
    /* Kramer-Grün, abgeleitet aus dem Original-Maschinenfoto (#0e7c6b) */
    --brand-900:#062E27;
    --brand-800:#0A4A3F;
    --brand-700:#0E7C68;
    --brand-600:#129679;
    --brand-500:#1CB18F;
    --brand-100:#E3F3EE;
    --gray-900:#1B2024;
    --gray-700:#3D444A;
    --gray-500:#6B7378;
    --gray-300:#C9CFD3;
    --gray-200:#DFE3E6;
    --gray-100:#F3F4F5;
    --white:#FFFFFF;
    --radius-lg:20px;
    --radius-md:14px;
    --shadow-card:0 16px 40px -12px rgba(4,32,59,0.28);
    --font-display:'Arial Narrow', 'Helvetica Neue Condensed', 'Segoe UI', Arial, sans-serif;
    --font-body:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    --font-mono:'Courier New', Courier, monospace;
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font-body);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.0) 0%, rgba(255,255,255,0.0) 100%),
      repeating-linear-gradient(0deg, rgba(15,92,153,0.045) 0px, rgba(15,92,153,0.045) 1px, transparent 1px, transparent 40px),
      repeating-linear-gradient(90deg, rgba(15,92,153,0.045) 0px, rgba(15,92,153,0.045) 1px, transparent 1px, transparent 40px),
      var(--gray-100);
    color:var(--gray-900);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:18px;
    overflow-x:hidden;
  }

  .app{
    width:100%;
    max-width:480px;
    min-height:min(760px, 92vh);
    background:var(--white);
    border-radius:28px;
    box-shadow:var(--shadow-card);
    border:1px solid var(--gray-200);
    display:flex;
    flex-direction:column;
    overflow:hidden;
    position:relative;
  }

  /* ===== Header / Plate ===== */
  .topbar{
    background:linear-gradient(135deg, var(--brand-900) 0%, var(--brand-700) 100%);
    color:var(--white);
    padding:18px 20px 16px;
    position:relative;
    flex-shrink:0;
  }
  .topbar-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:10px;
  }
  .brand-mark{
    width:34px; height:34px;
    border-radius:8px;
    background:var(--white);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .brand-mark svg{width:22px;height:22px;}
  .brand-mark-logo{
    width:auto;
    height:32px;
    padding:6px 9px;
    border-radius:9px;
  }
  .brand-mark-logo img{
    height:100%;
    width:auto;
    display:block;
  }
  .brand-text .eyebrow{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--brand-100);
    opacity:0.85;
    line-height:1;
  }
  .brand-text .title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:20px;
    letter-spacing:0.01em;
    line-height:1.15;
    margin-top:2px;
  }
  .back-btn{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.28);
    color:var(--white);
    font-family:var(--font-body);
    font-weight:600;
    font-size:13px;
    padding:9px 14px;
    border-radius:999px;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:6px;
    transition:background 0.15s ease, transform 0.1s ease;
    white-space:nowrap;
  }
  .back-btn:active{transform:scale(0.95);}
  .back-btn:hover{background:rgba(255,255,255,0.2);}
  .back-btn[hidden]{display:none;}
  .back-btn svg{width:14px;height:14px;}

  /* Progress gauge */
  .gauge{
    margin-top:14px;
  }
  .gauge-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.1em;
    color:var(--brand-100);
    opacity:0.8;
    margin-bottom:6px;
    display:flex;
    justify-content:space-between;
  }
  .gauge-track{
    height:6px;
    background:rgba(255,255,255,0.18);
    border-radius:999px;
    overflow:hidden;
  }
  .gauge-fill{
    height:100%;
    background:linear-gradient(90deg, var(--brand-500), var(--white));
    border-radius:999px;
    transition:width 0.45s cubic-bezier(.4,0,.2,1);
  }

  /* ===== Stage ===== */
  .stage{
    flex:1;
    position:relative;
    overflow:hidden;
    display:flex;
    flex-direction:column;
  }
  .screen{
    padding:26px 22px 24px;
    display:flex;
    flex-direction:column;
    flex:1;
    animation:slideIn 0.32s cubic-bezier(.25,.8,.35,1);
  }
  @keyframes slideIn{
    from{opacity:0; transform:translateX(14px);}
    to{opacity:1; transform:translateX(0);}
  }
  .screen.back-anim{animation:slideInBack 0.32s cubic-bezier(.25,.8,.35,1);}
  @keyframes slideInBack{
    from{opacity:0; transform:translateX(-14px);}
    to{opacity:1; transform:translateX(0);}
  }

  .question-icon{
    width:52px; height:52px;
    border-radius:14px;
    background:var(--brand-100);
    display:flex; align-items:center; justify-content:center;
    margin-bottom:16px;
  }
  .question-icon svg{width:28px;height:28px;}

  h1.question{
    font-family:var(--font-display);
    font-weight:700;
    font-size:25px;
    line-height:1.22;
    color:var(--gray-900);
    margin:0 0 6px;
    letter-spacing:0.005em;
  }
  p.subtext{
    font-size:14px;
    color:var(--gray-500);
    margin:0 0 22px;
    line-height:1.5;
  }

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:auto;
    margin-bottom:6px;
    position:relative;
  }
  .options::before{
    content:"";
    position:absolute;
    left:35px;
    top:6px;
    bottom:6px;
    width:2px;
    background-image:repeating-linear-gradient(to bottom, var(--gray-300) 0 6px, transparent 6px 13px);
    z-index:0;
  }
  .opt-btn{
    display:flex;
    align-items:center;
    gap:14px;
    width:100%;
    text-align:left;
    background:var(--white);
    border:1.5px solid var(--gray-200);
    border-radius:var(--radius-md);
    padding:16px 16px;
    font-family:var(--font-body);
    font-size:16px;
    font-weight:600;
    color:var(--gray-900);
    cursor:pointer;
    transition:border-color 0.15s ease, background 0.15s ease, transform 0.08s ease, box-shadow 0.15s ease;
    min-height:64px;
    position:relative;
    z-index:1;
  }
  .opt-btn .opt-icon{
    width:38px; height:38px;
    border-radius:10px;
    background:var(--gray-100);
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
    transition:background 0.15s ease;
    position:relative;
  }
  .opt-btn .opt-icon::after{
    content:"";
    position:absolute;
    inset:-3px;
    border-radius:13px;
    border:1px solid transparent;
    transition:border-color 0.15s ease;
  }
  .opt-btn:hover .opt-icon::after{border-color:var(--brand-500); opacity:0.4;}
  .opt-btn .opt-icon svg{width:20px;height:20px;}
  .opt-btn .opt-text{flex:1;}
  .opt-btn .opt-sub{
    display:block;
    font-weight:400;
    font-size:12.5px;
    color:var(--gray-500);
    margin-top:2px;
  }
  .opt-btn .chev{
    width:18px;height:18px;
    color:var(--gray-300);
    flex-shrink:0;
    transition:transform 0.15s ease;
  }
  .opt-btn:hover{border-color:var(--brand-500); box-shadow:0 6px 18px -8px rgba(14,124,104,0.35);}
  .opt-btn:hover .opt-icon{background:var(--brand-100);}
  .opt-btn:hover .chev{transform:translateX(2px); color:var(--brand-500);}
  .opt-btn:active{transform:scale(0.97); background:var(--brand-100);}

  /* Maschinenplaketten-Akzent (Rivets) für Icon-Kacheln & Dokument-Pille */
  .question-icon, .doc-pill{position:relative;}
  .question-icon::before, .question-icon::after,
  .doc-pill::before, .doc-pill::after{
    content:"";
    position:absolute;
    width:3px; height:3px;
    border-radius:50%;
    background:rgba(255,255,255,0.7);
    box-shadow:0 0 0 1px rgba(0,0,0,0.06);
  }
  .question-icon::before{top:6px; left:6px;}
  .question-icon::after{bottom:6px; right:6px;}
  .doc-pill::before{top:6px; left:6px;}
  .doc-pill::after{bottom:6px; right:6px;}

  /* ===== Loading (Radlader) ===== */
  .loading-screen{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px;
    gap:18px;
  }
  .loader-stage{
    width:220px;
    height:140px;
    position:relative;
  }
  .ground-line{
    position:absolute;
    bottom:14px; left:0; right:0;
    border-bottom:3px dashed var(--gray-300);
  }
  .loader-svg-wrap{
    position:absolute;
    bottom:14px; left:10px;
    animation:bob 1.1s ease-in-out infinite;
  }
  @keyframes bob{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
  }
  .wheel-group{
    transform-box:fill-box;
    transform-origin:center;
    animation:spin 0.7s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .boom{
    transform-box:fill-box;
    transform-origin:20% 80%;
    animation:boom-move 1.3s ease-in-out infinite;
  }
  @keyframes boom-move{
    0%,100%{transform:rotate(0deg);}
    50%{transform:rotate(-6deg);}
  }
  .dust{
    opacity:0;
    animation:dust 1.4s ease-out infinite;
  }
  .dust.d2{animation-delay:0.45s;}
  .dust.d3{animation-delay:0.9s;}
  @keyframes dust{
    0%{opacity:0; transform:translate(0,0) scale(0.5);}
    20%{opacity:0.55;}
    100%{opacity:0; transform:translate(-18px,-6px) scale(1.15);}
  }
  .loading-text{
    text-align:center;
  }
  .loading-text .lt-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:18px;
    color:var(--brand-800);
  }
  .loading-text .lt-sub{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--gray-500);
    margin-top:6px;
  }
  .dots span{
    display:inline-block;
    animation:dotPulse 1.1s infinite;
  }
  .dots span:nth-child(2){animation-delay:0.15s;}
  .dots span:nth-child(3){animation-delay:0.3s;}
  @keyframes dotPulse{
    0%,60%,100%{opacity:0.25;}
    30%{opacity:1;}
  }

  /* ===== Result ===== */
  .result-badge{
    width:56px; height:56px;
    border-radius:50%;
    background:linear-gradient(135deg, var(--brand-700), var(--brand-500));
    display:flex; align-items:center; justify-content:center;
    margin-bottom:16px;
    box-shadow:0 10px 24px -8px rgba(15,92,153,0.5);
  }
  .result-badge svg{width:28px;height:28px; color:var(--white);}
  .result-eyebrow{
    font-family:var(--font-mono);
    font-size:11px;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--brand-600);
    margin-bottom:6px;
    font-weight:700;
  }
  h1.result-title{
    font-family:var(--font-display);
    font-weight:700;
    font-size:24px;
    line-height:1.2;
    margin:0 0 10px;
    color:var(--gray-900);
  }
  p.result-desc{
    font-size:14.5px;
    line-height:1.6;
    color:var(--gray-700);
    margin:0 0 16px;
  }
  .doc-pill{
    display:flex;
    align-items:center;
    gap:10px;
    background:var(--gray-100);
    border:1px solid var(--gray-200);
    border-radius:var(--radius-md);
    padding:12px 14px;
    margin-bottom:22px;
  }
  .doc-pill svg{width:20px;height:20px; color:var(--brand-600); flex-shrink:0;}
  .doc-pill .doc-name{
    font-size:13px;
    font-weight:600;
    color:var(--gray-700);
    word-break:break-word;
    line-height:1.4;
  }
  .doc-pill .doc-label{
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--gray-500);
    text-transform:uppercase;
    display:block;
    margin-bottom:2px;
  }
  a.doc-pill{
    text-decoration:none;
    transition:border-color 0.15s ease, background 0.15s ease;
  }
  a.doc-pill:hover{border-color:var(--brand-500); background:var(--brand-100);}
  .doc-open{
    margin-left:auto;
    flex-shrink:0;
    color:var(--brand-600);
  }
  .doc-open svg{width:16px;height:16px;}

  .result-actions{
    margin-top:auto;
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .btn-primary, .btn-secondary{
    border:none;
    border-radius:999px;
    padding:17px 20px;
    font-family:var(--font-body);
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition:transform 0.1s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .btn-primary{
    background:linear-gradient(135deg, var(--brand-700), var(--brand-600));
    color:var(--white);
    box-shadow:0 10px 22px -8px rgba(15,92,153,0.55);
  }
  .btn-primary:active{transform:scale(0.97);}
  .btn-secondary{
    background:var(--white);
    color:var(--gray-700);
    border:1.5px solid var(--gray-200);
  }
  .btn-secondary:active{transform:scale(0.97); background:var(--gray-100);}
  .btn-primary svg, .btn-secondary svg{width:18px;height:18px;}

  /* Start screen flourish */
  .start-screen{
    align-items:flex-start;
  }
  .start-hero{
    width:100%;
    border-radius:18px;
    background:linear-gradient(160deg, var(--brand-900), var(--brand-700) 65%, var(--brand-600));
    padding:22px 18px;
    margin-bottom:20px;
    position:relative;
    overflow:hidden;
  }
  .start-hero .hero-grid{
    position:absolute; inset:0;
    background-image:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 26px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.06) 0 1px, transparent 1px 26px);
  }
  .hero-track{
    position:absolute;
    right:-10px; bottom:-18px;
    width:150px; height:110px;
    opacity:0.55;
    pointer-events:none;
  }
  .hero-track path{
    fill:none;
    stroke:rgba(255,255,255,0.55);
    stroke-width:2;
    stroke-linecap:round;
    stroke-dasharray:5 9;
    animation:trackFlow 3.2s linear infinite;
  }
  @keyframes trackFlow{ to{ stroke-dashoffset:-56; } }
  .start-hero-content{position:relative; z-index:1;}
  .start-hero .eyebrow{
    font-family:var(--font-mono);
    font-size:10.5px;
    letter-spacing:0.12em;
    color:var(--brand-100);
    text-transform:uppercase;
    opacity:0.85;
  }
  .start-hero h1{
    font-family:var(--font-display);
    font-weight:700;
    font-size:26px;
    color:var(--white);
    margin:6px 0 8px;
    line-height:1.15;
  }
  .start-hero p{
    color:var(--brand-100);
    font-size:13.5px;
    line-height:1.55;
    margin:0;
    opacity:0.95;
  }

  footer.brandfoot{
    padding:14px 22px 18px;
    text-align:center;
    font-family:var(--font-mono);
    font-size:10px;
    letter-spacing:0.08em;
    color:var(--gray-300);
    border-top:1px solid var(--gray-100);
    flex-shrink:0;
  }
  .brandfoot-logo{
    display:block;
    height:16px;
    width:auto;
    margin:0 auto 6px;
    opacity:0.92;
  }
  .brandfoot-tag{display:block;}

  /* Magischer Hut-Flug — kleine Anspielung auf den "Sortier-Hut" im Titel */
  .magic-hat-wrap{
    position:absolute;
    top:-8px; right:14px;
    width:50px; height:50px;
    z-index:2;
    transform:translate(-230px,-110px) rotate(-65deg) scale(0.55);
    opacity:0;
    animation:hatSwoop 1.5s cubic-bezier(.2,.8,.25,1) 0.15s forwards,
              hatFloat 3.2s ease-in-out 1.65s infinite;
    pointer-events:none;
  }
  .magic-hat-wrap svg{width:100%;height:100%; filter:drop-shadow(0 6px 10px rgba(0,0,0,0.28));}
  @keyframes hatSwoop{
    0%{ transform:translate(-230px,-110px) rotate(-65deg) scale(0.55); opacity:0; }
    12%{ opacity:1; }
    70%{ transform:translate(6px,4px) rotate(8deg) scale(1.05); opacity:1; }
    100%{ transform:translate(0,0) rotate(-8deg) scale(1); opacity:1; }
  }
  @keyframes hatFloat{
    0%,100%{ transform:translate(0,0) rotate(-8deg); }
    50%{ transform:translate(0,-3px) rotate(-5deg); }
  }
  .mh-sparkle{
    position:absolute;
    width:7px; height:7px;
    background:linear-gradient(135deg,#FFFFFF,#FFE9A8);
    border-radius:1px;
    z-index:2;
    pointer-events:none;
    transform:rotate(45deg) scale(0);
    opacity:0;
    animation:mhTwinkle 0.7s ease-out forwards;
  }
  @keyframes mhTwinkle{
    0%{ transform:rotate(45deg) scale(0); opacity:0; }
    40%{ transform:rotate(45deg) scale(1); opacity:1; }
    100%{ transform:rotate(45deg) scale(0.2); opacity:0; }
  }

  @media (prefers-reduced-motion: reduce){
    .magic-hat-wrap, .mh-sparkle{animation:none !important; opacity:1 !important; transform:none !important;}
  }

  @media (max-width:380px){
    h1.question{font-size:22px;}
    .start-hero h1{font-size:22px;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }
</style>
</head>
<body>

<div class="app" id="app">

  <div class="topbar">
    <div class="topbar-row">

function createPraxisNodes(prefix, typFull){
  const nodes = {};
  nodes[`${prefix}_split`] = {
    type: "question",
    step: 1, total: 3,
    icon: "layers",
    question: "Ein Bauteil kommt verspätet in der Fertigung an. Was ist dein erster Reflex?",
    sub: "Daraus ergibt sich dein Themenfeld für " + (typFull === "praktikum" ? "dein Praktikum" : "deine Abschlussarbeit") + " bei Kramer.",
    options: [
      { label: "Ich schaue mir den Ablauf an und finde den Engpass", icon: "factory", next: `${prefix}_prozess` },
      { label: "Ich frage zuerst: Stimmt eigentlich die Qualität noch?", icon: "shield", next: () => buildPraxisResult(typFull, "qm") },
      { label: "Ich denke sofort in Lieferketten und Materialfluss", icon: "truck", next: `${prefix}_kette` }
    ]
  };
  nodes[`${prefix}_prozess`] = {
    type: "question",
    step: 2, total: 3,
    icon: "factory",
    question: "Womit verbringst du deine Zeit lieber?",
    sub: "Beides dreht sich um schlanke, stabile Prozesse.",
    options: [
      { label: "Ich plane, wie eine Serie reibungslos durch die Fertigung läuft", icon: "factory", next: () => buildPraxisResult(typFull, "arbeitsvorbereitung") },
      { label: "Ich spüre Verschwendung auf und mache Abläufe schlanker", icon: "layers", next: () => buildPraxisResult(typFull, "lean") }
    ]
  };
  nodes[`${prefix}_kette`] = {
    type: "question",
    step: 2, total: 3,
    icon: "truck",
    question: "Eine Lieferung hängt im Hafen fest. Was tust du?",
    sub: "Beide Wege drehen sich darum, Material auf dem richtigen Weg zu halten.",
    options: [
      { label: "Ich plane einen alternativen Weg durchs eigene Werk", icon: "truck", next: () => buildPraxisResult(typFull, "logistik") },
      { label: "Ich blicke auf die ganze Kette — vom Lieferanten bis zur Auslieferung", icon: "gear", next: () => buildPraxisResult(typFull, "scm") }
    ]
  };
  return nodes;
}


function buildPraxisResult(typ, bereichKey){
  const b = PRAXIS_BEREICHE[bereichKey];
  const typLabel = typ === "praktikum" ? "Praktikum" : "Abschlussarbeit";
  const intro = typ === "praktikum"
    ? "Ein Praktikum bei Kramer im Bereich"
    : "Eine Abschlussarbeit bei Kramer im Bereich";
  return {
    title: `${typLabel}: ${b.label}`,
    document: `Allgemeine Ausschreibung – ${typLabel} ${b.label}`,
    documentUrl: null, // TODO: Link zur passenden Ausschreibung/Themenliste hinterlegen
    desc: `${intro} ${b.label} könnte genau dein Thema sein. ${b.desc} Unser Team berät dich gern zu aktuell offenen Themen und passenden Einstiegszeitpunkten.`,
    applyUrl: BEWERBUNGSPORTAL_URL, // TODO: spezifischen Link/Filter für diesen Bereich hinterlegen
    icon: b.icon
  };
}

const stage = document.getElementById("stage");

const gaugeFill = document.getElementById("gaugeFill");
const gaugeStepLabel = document.getElementById("gaugeStepLabel");
const gaugeStepCount = document.getElementById("gaugeStepCount");
const gaugeWrap = document.getElementById("gaugeWrap");

let historyStack = ["start"]; // speichert node-IDs für "Zurück"

function currentNodeId(){ return historyStack[historyStack.length - 1]; }

function resolveNode(idOrResult){
  if (typeof idOrResult === "string") return TREE[idOrResult];
  if (typeof idOrResult === "function") return { type: "result", ...idOrResult() };
  return idOrResult;
}

function updateGauge(node){
  if (node.type === "result"){
    gaugeFill.style.width = "100%";
    gaugeStepLabel.textContent = "ERGEBNIS";
    gaugeStepCount.textContent = "FERTIG";
    return;
  }
  const step = node.step ?? 0;
  const total = node.total ?? 1;
  const pct = Math.round((step / total) * 100);
  gaugeFill.style.width = pct + "%";
  gaugeStepLabel.textContent = step === 0 ? "START" : "FRAGE";
  gaugeStepCount.textContent = step === 0 ? "" : `SCHRITT ${step} / ${total}`;
}

function iconSvg(name){ return ICONS[name] || ICONS.gear; }

function renderQuestionOrStart(node, isStart, animClass){
  const wrap = document.createElement("div");
  wrap.className = "screen" + (animClass ? " " + animClass : "") + (isStart ? " start-screen" : "");

  if (isStart){
    wrap.innerHTML = `
      <div class="start-hero">

function renderResult(node, animClass){
  const wrap = document.createElement("div");
  wrap.className = "screen" + (animClass ? " " + animClass : "");
  const docInner = `
      ${ICONS.doc}
      <div>
        <span class="doc-label">Stellendokument</span>
        <span class="doc-name">${node.document}</span>
      </div>${node.documentUrl ? `<span class="doc-open">${ICONS.external}</span>` : ""}`;
  const docPill = node.documentUrl
    ? `<a class="doc-pill" href="${node.documentUrl}" target="_blank" rel="noopener">${docInner}</a>`
    : `<div class="doc-pill">${docInner}</div>`;
  wrap.innerHTML = `
    <div class="result-badge">${ICONS.check}</div>
    <div class="result-eyebrow">Deine Empfehlung</div>
    <h1 class="result-title">${node.title}</h1>
    <p class="result-desc">${node.desc}</p>
    ${docPill}
    <div class="result-actions">
      <a class="btn-primary" href="${node.applyUrl}" target="_blank" rel="noopener">
        Jetzt bewerben ${ICONS.external}
      </a>
      <button class="btn-secondary" id="restartBtn">${ICONS.refresh} Neue Anfrage starten</button>
    </div>
  `;
  wrap.querySelector("#restartBtn").addEventListener("click", restart);
  return wrap;
}

function selectOption(opt){
  // Loading-Animation (Radlader) einblenden, dann zum nächsten Knoten
  const loadingEl = renderLoading();
  stage.innerHTML = "";
  stage.appendChild(loadingEl);
  backBtn.hidden = true;

  setTimeout(() => {
    const nextNode = resolveNode(opt.next);
    historyStack.push(opt.next); // Original-Referenz (string oder function) merken
    renderCurrent("forward");
  }, 950);
}

function renderCurrent(direction){
  const raw = historyStack[historyStack.length - 1];
  const node = resolveNode(raw);
  const animClass = direction === "back" ? "back-anim" : "";

  let el;
  if (node.type === "start"){
    el = renderQuestionOrStart(node, true, animClass);
  } else if (node.type === "question"){
    el = renderQuestionOrStart(node, false, animClass);
  } else {
    el = renderResult(node, animClass);
  }

  stage.innerHTML = "";
  stage.appendChild(el);
  updateGauge(node);
  backBtn.hidden = historyStack.length <= 1;
}

function goBack(){
  if (historyStack.length > 1){
    historyStack.pop();
    renderCurrent("back");
  }
}

function restart(){
  historyStack = ["start"];
  renderCurrent("back");
}

// Initiales Rendering
renderCurrent("forward");
</script>
</body>
</html>
